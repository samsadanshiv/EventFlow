<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventFlow - Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-200 flex items-center justify-center min-h-screen p-4">

    <div class="signup-modal bg-white rounded-2xl shadow-2xl overflow-hidden relative">
        <button class="absolute top-4 right-5 text-white/70 hover:text-white z-20 text-xl">✕</button>

        <div class="header-gradient pt-8 pb-6 px-8 text-center text-white">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-white/20 rounded-xl mb-3 backdrop-blur-sm">
                <svg viewBox="0 0 24 24" class="h-7 w-7 fill-white">
                    <path d="M12 3L1 9L12 15L21 10.09V17H23V9M5 13.18V17.18L12 21L19 17.18V13.18L12 17L5 13.18Z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold mb-1">Create Account</h1>
            <p class="text-white/80 text-sm">Join EventFlow today</p>
        </div>

        <div class="form-content p-6">
            <form id="signupForm" class="space-y-4">
                
                <div class="space-y-1">
                    <label class="block text-xs font-bold text-gray-600 ml-1">Full Name</label>
                    <div class="relative">
                        <span class="input-icon">👤</span>
                        <input type="text" placeholder="John Doe" class="custom-input" required>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="block text-xs font-bold text-gray-600 ml-1">Email Address</label>
                    <div class="relative">
                        <span class="input-icon">✉️</span>
                        <input type="email" placeholder="your.email@college.edu" class="custom-input" required>
                    </div>
                </div>

                <div class="flex gap-4">
                    <div class="w-1/2 space-y-1">
                        <label class="block text-xs font-bold text-gray-600 ml-1">Department</label>
                        <div class="relative">
                            <span class="input-icon">🏢</span>
                            <select class="custom-input appearance-none">
                                <option>Select</option>
                                <option>Computer</option>
                                <option>IT</option>
                            </select>
                        </div>
                    </div>
                    <div class="w-1/2 space-y-1">
                        <label class="block text-xs font-bold text-gray-600 ml-1">Year</label>
                        <select class="custom-input appearance-none pl-4">
                            <option>Select</option>
                            <option>FY</option>
                            <option>SY</option>
                            <option>TY</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="block text-xs font-bold text-gray-600 ml-1">Password</label>
                    <div class="relative">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="pass" placeholder="Create a password" class="custom-input" required>
                        <button type="button" class="eye-btn" onclick="togglePass('pass')">👁️</button>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="block text-xs font-bold text-gray-600 ml-1">Confirm Password</label>
                    <div class="relative">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="confirmPass" placeholder="Confirm your password" class="custom-input" required>
                        <button type="button" class="eye-btn" onclick="togglePass('confirmPass')">👁️</button>
                    </div>
                </div>

                <button type="submit" class="w-full btn-gradient text-white py-3 rounded-xl font-bold text-md shadow-lg mt-2">
                    Create Account
                </button>
            </form>

            <div class="divider"><span>or</span></div>

            <p class="text-center text-sm text-gray-500 font-medium">
                Already have an account? <a href="#" class="text-purple-600 font-bold hover:underline">Login</a>
            </p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
